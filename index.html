header{background:var(--w);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px var(--sh)}
.hdr{max-width:1200px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{cursor:pointer;flex-shrink:0}
.bn{font-size:1.35rem;font-weight:300;letter-spacing:.17em;text-transform:uppercase;line-height:1.1}
.bt{font-size:.57rem;letter-spacing:.23em;color:var(--m);text-transform:uppercase;margin-top:2px;font-style:italic}
.sw{flex:1;min-width:150px;max-width:440px}
.sw input{width:100%;padding:9px 14px;background:var(--bg);border:1px solid var(--bd);font-family:var(--f);font-size:.87rem;color:var(--t);border-radius:2px;outline:none;transition:border .2s}
.sw input::placeholder{color:var(--m);font-style:italic}
.sw input:focus{border-color:var(--t)}
.wahdr{margin-left:auto;flex-shrink:0}
.wahdr a{display:flex;align-items:center;gap:6px;padding:8px 15px;background:var(--t);color:var(--w);text-decoration:none;font-size:.6rem;letter-spacing:.17em;text-transform:uppercase;border-radius:2px;white-space:nowrap;transition:background .2s}
.wahdr a:hover{background:#4a2e29}
.ib{max-width:1200px;margin:0 auto;padding:10px 22px 0;font-size:.67rem;letter-spacing:.13em;text-transform:uppercase;color:var(--m)}
.gw{max-width:1200px;margin:0 auto;padding:14px 22px 36px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.card{background:var(--w);border:1px solid var(--bd);border-radius:3px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 26px var(--sh)}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--bg)}
.cb{padding:11px 12px 13px;flex:1;display:flex;flex-direction:column}
.cn{font-size:.76rem;letter-spacing:.09em;text-transform:uppercase;margin-bottom:4px;line-height:1.35}
.cd{font-size:.7rem;color:var(--m);font-style:italic;flex:1;margin-bottom:10px;line-height:1.5}
.btn{width:100%;padding:9px 0;background:var(--t);color:var(--w);border:none;font-family:var(--f);font-size:.6rem;letter-spacing:.19em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background .2s}
.btn:hover{background:#4a2e29}
.pgn{display:flex;align-items:center;justify-content:center;gap:5px;padding:24px 22px 50px;flex-wrap:wrap}
.pg{min-width:36px;height:36px;padding:0 9px;background:var(--w);border:1px solid var(--bd);font-family:var(--f);font-size:.75rem;color:var(--t);cursor:pointer;border-radius:2px;transition:all .18s;display:flex;align-items:center;justify-content:center}
.pg:hover:not(:disabled){background:var(--bg)}
.pg.on{background:var(--t);color:var(--w);border-color:var(--t)}
.pg:disabled{opacity:.3;cursor:default}
.dot{padding:0 3px;color:var(--m);font-size:.8rem;display:flex;align-items:center}
.empty{text-align:center;padding:70px 20px;color:var(--m);font-size:.88rem;font-style:italic;letter-spacing:.1em;grid-column:1/-1}
.ov{display:none;position:fixed;inset:0;background:rgba(50,28,22,.42);z-index:200;align-items:center;justify-content:center;padding:16px}
.ov.open{display:flex}
.mo{background:var(--w);border-radius:4px;max-width:400px;width:100%;padding:28px 28px 24px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.mcl{position:absolute;top:12px;right:16px;background:none;border:none;cursor:pointer;font-size:1.25rem;color:var(--m);line-height:1;padding:4px}
.mh{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--bd)}
.mpn{font-size:.9rem;font-weight:300;margin-bottom:5px;line-height:1.35}
.mpd{font-size:.72rem;color:var(--m);font-style:italic;margin-bottom:18px;line-height:1.5}
label{display:block;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--m);margin-bottom:4px}
.fi{width:100%;padding:8px 11px;background:var(--bg);border:1px solid var(--bd);font-family:var(--f);font-size:.86rem;color:var(--t);border-radius:2px;outline:none;margin-bottom:12px;transition:border .2s}
.fi:focus{border-color:var(--t)}
textarea.fi{height:62px;resize:vertical}
.mwa{width:100%;padding:12px 0;background:#25D366;color:#fff;border:none;font-family:var(--f);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;border-radius:2px;margin-top:2px;transition:background .2s}
.mwa:hover{background:#1da851}
.mnote{font-size:.58rem;color:var(--m);text-align:center;margin-top:9px;letter-spacing:.07em;font-style:italic}
footer{background:var(--w);border-top:1px solid var(--bd);padding:26px 22px;text-align:center}
.fl{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--m);margin-bottom:7px}
.fn{font-size:1.05rem;font-weight:300;letter-spacing:.17em;text-transform:uppercase;margin-bottom:13px}
.fc{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.fc a{display:inline-block;padding:7px 16px;border:1px solid var(--bd);font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--t);text-decoration:none;border-radius:2px;transition:all .2s}
.fc a:hover{background:var(--t);color:var(--w)}
@media(max-width:580px){
.hdr{padding:11px 14px}
.bn{font-size:1.1rem}
.gw{padding:10px 12px 28px}
.grid{grid-template-columns:repeat(2,1fr);gap:9px}
.mo{padding:22px 16px 18px}
.wahdr a span{display:none}
}
</style>
</head>

function search(){const q=document.getElementById('q').value.toLowerCase().trim();vis=q?P.filter(p=>p.n.toLowerCase().includes(q)||p.d.toLowerCase().includes(q)):P.slice();pg=1;render();}
function reset(){document.getElementById('q').value='';vis=P.slice();pg=1;render();}
function render(){
const g=document.getElementById('grid');
const s=(pg-1)*PER,sl=vis.slice(s,s+PER);
document.getElementById('ib').textContent=vis.length===P.length?`All ${P.length} products`:`${vis.length} result${vis.length===1?'':'s'} found`;
if(!sl.length){g.innerHTML='<div class="empty">No products found. Try a different search.</div>';}
else{g.innerHTML=sl.map(p=>`<div class="card" onclick='openM(${JSON.stringify(p.n)},${JSON.stringify(p.d)})'><img src="${p.i}" alt="${p.n}" loading="lazy"><div class="cb"><div class="cn">${p.n}</div><div class="cd">${p.d}</div><button class="btn">Order via WhatsApp</button></div></div>`).join('');}
renderPgn();
window.scrollTo({top:0,behavior:'smooth'});
}
function renderPgn(){
const tot=Math.ceil(vis.length/PER);
if(tot<=1){document.getElementById('pgn').innerHTML='';return;}
let h=`<button class="pg" onclick="go(${pg-1})" ${pg===1?'disabled':''}>&#8249;</button>`;
for(let i=1;i<=tot;i++){
if(tot>8&&i>2&&i<tot-1&&Math.abs(i-pg)>1){if(i===3||i===tot-2)h+='<span class="dot">...</span>';}
else{h+=`<button class="pg${i===pg?' on':''}" onclick="go(${i})">${i}</button>`;}
}
h+=`<button class="pg" onclick="go(${pg+1})" ${pg===tot?'disabled':''}>&#8250;</button>`;
document.getElementById('pgn').innerHTML=h;
}
function go(p){const t=Math.ceil(vis.length/PER);if(p<1||p>t)return;pg=p;render();}
function openM(n,d){
cN=n;cD=d;
document.getElementById('mpn').textContent=n;
document.getElementById('mpd').textContent=d;
['mc','mn','mp','mno'].forEach(id=>document.getElementById(id).value='');
document.getElementById('mq').value='1';
document.getElementById('ov').classList.add('open');
document.body.style.overflow='hidden';
}
function closeM(){document.getElementById('ov').classList.remove('open');document.body.style.overflow='';}
function bgClose(e){if(e.target.id==='ov')closeM();}
function sendWA(){
const c=document.getElementById('mc').value.trim();
const q=document.getElementById('mq').value.trim()||'1';
const n=document.getElementById('mn').value.trim();
const p=document.getElementById('mp').value.trim();
const no=document.getElementById('mno').value.trim();
const msg=`Hi Rheenah! I'd like to order:\n\nProduct: ${cN}\nColour/Variant: ${c||'--'}\nQty: ${q}\nMy Name: ${n||'--'}\nMy Number: ${p||'--'}${no?'\nNotes: '+no:''}`;
window.open('https://wa.me/256742882140?text='+encodeURIComponent(msg),'_blank');
closeM();
}
render();
</script>
</body>
</html>
